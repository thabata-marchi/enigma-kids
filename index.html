<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALA DOS ENIGMAS - EXPLORAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
<div id="app">

  <div id="screen-start">
    <img id="start-character-img" src="" alt="personagem" style="width:70px; height:auto; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.25)); animation: bob 1.4s infinite;">
    <div class="title-brick"><span id="t-title">SALA DOS ENIGMAS · THE PUZZLE ROOM</span></div>
    <div class="controls-hint" id="t-controls"></div>
    <div class="lang-row">
      <button class="brick lang-btn pt" onclick="startGame('pt')">🇧🇷 PORTUGUÊS</button>
      <button class="brick lang-btn en" onclick="startGame('en')">🇺🇸 ENGLISH</button>
    </div>
  </div>

  <div id="hud">
    <div class="brick" id="room-label"></div>
    <div id="hud-right">
      <div class="brick hud-round-btn" id="reread-btn" onclick="rereadMessage()">❓</div>
      <div class="brick hud-round-btn" id="lumi-btn" onclick="showHint()"><img id="lumi-hud-img" src="" alt="LUMI" style="width:80%; height:auto;"></div>
    </div>
  </div>
  <div class="brick" id="instruction-bar" style="position:relative;">
    <span id="instruction-text"></span>
    <div class="close-x" onclick="hideInstruction()">✕</div>
  </div>

  <div id="world-viewport">

    <!-- ===== SALA 1 ===== -->
    <div class="world-layer active" id="world-room1">
      <div class="wall" id="r1-wall-1" style="left:300px; top:150px; width:200px; height:30px;"></div>
      <div class="wall" id="r1-wall-2" style="left:600px; top:400px; width:30px; height:220px;"></div>

      <div class="obj obj-shape collider" id="obj-rect" style="left:120px; top:120px; width:90px; height:60px; background:var(--blue); border-radius:10px;">
        <div class="label-tag" id="label-rect"></div>
      </div>
      <div class="obj obj-shape collider" id="obj-circle" style="left:700px; top:680px; width:80px; height:80px; background:var(--green); border-radius:50%;">
        <div class="label-tag" id="label-circle"></div>
      </div>
      <div class="obj" id="obj-tri" style="left:480px; top:200px; width:0; height:0; border-left:45px solid transparent; border-right:45px solid transparent; border-bottom:78px solid var(--red); filter:drop-shadow(0 5px 0 rgba(0,0,0,0.2));"></div>
      <div class="obj obj-shape" id="obj-star" style="left:200px; top:650px; width:80px; height:80px; background:var(--yellow); clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);"></div>

      <div class="obj collider" id="door1" style="left:830px; top:380px; width:90px; height:140px; background-size:contain; background-repeat:no-repeat; background-position:bottom;"></div>

      <div id="player" style="left:450px; top:450px;">
        <div class="shadow"></div>
        <img id="player-img" src="" alt="personagem">
      </div>
    </div>

    <!-- ===== SALA 2 ===== -->
    <div class="world-layer" id="world-room2">
      <div class="wall" id="r2-wall-1" style="left:250px; top:200px; width:260px; height:30px;"></div>
      <div class="wall" id="r2-wall-2" style="left:550px; top:500px; width:30px; height:200px;"></div>

      <div class="obj collider" id="console-dots" style="left:130px; top:600px; width:70px; height:70px;">
        <img src="" id="console-dots-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-dots"></div>
      </div>
      <div class="obj collider" id="console-emoji" style="left:650px; top:150px; width:70px; height:70px;">
        <img src="" id="console-emoji-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-emoji"></div>
      </div>
      <div class="obj collider" id="stranger" style="left:430px; top:430px; width:90px; height:130px;">
        <img src="" id="stranger-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-stranger"></div>
      </div>
      <div class="obj collider" id="door2" style="left:830px; top:380px; width:90px; height:140px; background-size:contain; background-repeat:no-repeat; background-position:bottom;"></div>
    </div>

    <!-- ===== SALA 3 ===== -->
    <div class="world-layer" id="world-room3">
      <div class="wall" id="r3-wall-1" style="left:280px; top:180px; width:30px; height:260px;"></div>
      <div class="wall" id="r3-wall-2" style="left:560px; top:480px; width:260px; height:30px;"></div>

      <div class="obj collider" id="console-math" style="left:120px; top:600px; width:70px; height:70px;">
        <img src="" id="console-math-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-math3"></div>
      </div>
      <div class="obj collider" id="console-anagram" style="left:650px; top:140px; width:70px; height:70px;">
        <img src="" id="console-anagram-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-anagram"></div>
      </div>
      <div class="obj collider" id="console-star" style="left:420px; top:650px; width:70px; height:70px;">
        <img src="" id="console-star-img" style="width:100%; height:auto;">
        <div class="label-tag" id="label-star"></div>
      </div>
      <div class="obj collider" id="dragon" style="left:430px; top:380px; width:100px; height:106px;">
        <img src="" id="dragon-img" style="width:100%; height:auto;">
      </div>
      <div class="obj collider" id="door3" style="left:830px; top:380px; width:100px; height:130px; background-size:contain; background-repeat:no-repeat; background-position:bottom;"></div>
    </div>
  </div>

  <div id="joystick-zone">
    <div id="joy-base"><div id="joy-stick"></div></div>
  </div>

  <div id="modal-overlay"><div class="modal-card brick" id="modal-card"></div></div>

  <div id="screen-success">
    <div class="title-brick" id="t-success-title"></div>
    <div class="modal-text" id="t-success-text" style="max-width:560px;"></div>
  </div>
</div>


<script src="src/i18n/strings.js"></script>
<script src="src/game/randomizer.js"></script>
<script src="src/game/assets.js"></script>
<script src="src/game/ui.js"></script>
<script src="src/game/engine.js"></script>
<script src="src/game/rooms/room1.js"></script>
<script src="src/game/rooms/room2.js"></script>
<script src="src/game/rooms/room3.js"></script>
<script src="src/game/main.js"></script>
</body>
</html>
